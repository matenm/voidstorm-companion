name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
          pip install pyinstaller

      - name: Run tests
        run: pytest

      - name: Build exe
        run: pyinstaller voidstorm-companion.spec

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create portable zip
        shell: pwsh
        run: Compress-Archive -Path dist\VoidstormCompanion.exe -DestinationPath "dist\VoidstormCompanion-${{ steps.version.outputs.version }}-portable.zip"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6"
          iscc installer.iss

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/VoidstormCompanion-${{ steps.version.outputs.version }}-Setup.exe
            dist/VoidstormCompanion-${{ steps.version.outputs.version }}-portable.zip
